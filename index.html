<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Interativo Agrinho Paraná</title>
    <style>
        /* Cores Temáticas e Reset */
        :root {
            --verde-escuro: #1b5e20;
            --verde-principal: #2e7d32;
            --verde-lima: #8bc34a;
            --fundo: #f1f8e9;
            --branco: #ffffff;
            --texto: #333333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--fundo);
            color: var(--texto);
        }

        header {
            background-color: var(--verde-principal);
            color: var(--branco);
            text-align: center;
            padding: 2.5rem 1rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        header h1 {
            font-size: 2.8rem;
            margin-bottom: 0.5rem;
        }

        /* Menu de Abas (Navegação entre Jogos) */
        .Abas-container {
            display: flex;
            justify-content: center;
            background-color: var(--verde-escuro);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .aba-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.7);
            padding: 1rem 2rem;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            border-bottom: 4px solid transparent;
        }

        .aba-btn:hover {
            color: var(--branco);
            background-color: rgba(255, 255, 255, 0.1);
        }

        .aba-btn.ativa {
            color: var(--branco);
            border-bottom: 4px solid var(--verde-lima);
            background-color: rgba(255, 255, 255, 0.05);
        }

        main {
            max-width: 850px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        /* Container dos Jogos */
        .janela-jogo {
            background: var(--branco);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: none; /* Escondido por padrão */
            text-align: center;
        }

        .janela-jogo.ativa {
            display: block; /* Mostra apenas a aba ativa */
        }

        .janela-jogo h2 {
            color: var(--verde-principal);
            margin-bottom: 1rem;
            font-size: 1.8rem;
        }

        .descricao-jogo {
            color: #666;
            margin-bottom: 1.5rem;
        }

        /* --- ESTILOS DO JOGO 1: MEMÓRIA --- */
        .placar {
            font-size: 1.2rem;
            margin-bottom: 1.5rem;
            font-weight: bold;
        }

        .grid-memoria {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            max-width: 450px;
            margin: 0 auto;
        }

        .carta {
            height: 95px;
            background-color: var(--verde-lima);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            color: transparent;
            transition: transform 0.3s, background-color 0.3s;
            user-select: none;
        }

        .carta.virada {
            background-color: var(--branco);
            border: 2px solid var(--verde-principal);
            color: initial;
            transform: rotateY(180deg);
        }

        .carta.combinada {
            background-color: #e8f5e9;
            border: 2px solid #a5d6a7;
            color: initial;
            cursor: default;
        }

        /* --- ESTILOS DO JOGO 2: QUIZ --- */
        .quiz-container {
            max-width: 600px;
            margin: 0 auto;
            text-align: left;
        }

        .pergunta-texto {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: #222;
        }

        .opcoes-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn-opcao {
            background-color: #f5f5f5;
            border: 2px solid #ddd;
            padding: 1rem;
            border-radius: 8px;
            text-align: left;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-opcao:hover {
            background-color: #e2f1e3;
            border-color: var(--verde-lima);
        }
